function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickQuestions(all, count, weights) {
  const byDomain = {};
  Object.keys(weights).forEach(k => byDomain[k] = []);
  all.forEach(q => { if (byDomain[q.domain]) byDomain[q.domain].push(q); });
  let selected = [];
  Object.entries(weights).forEach(([domain, w]) => {
    const n = Math.round(count * w);
    selected.push(...shuffle(byDomain[domain]).slice(0, n));
  });
  while (selected.length < count && selected.length < all.length) {
    const rest = all.filter(q => !selected.find(s => s.id === q.id));
    if (!rest.length) break;
    selected.push(rest[Math.floor(Math.random() * rest.length)]);
  }
  return shuffle(selected).slice(0, count);
}

function calcResults(questions, answers, domainMeta) {
  const meta = domainMeta || DOMAIN_META;
  const domains = {};
  Object.entries(meta).forEach(([k, v]) => {
    domains[k] = { label: v.label, total: 0, correct: 0, color: v.color };
  });
  let totalCorrect = 0;
  questions.forEach(q => {
    if (domains[q.domain]) {
      domains[q.domain].total++;
      if (answers[q.id] === q.correctIndex) {
        totalCorrect++;
        domains[q.domain].correct++;
      }
    }
  });
  const pct = Math.round((totalCorrect / questions.length) * 100);
  return {
    total: questions.length, correct: totalCorrect, percentage: pct, passed: pct >= 76,
    domains: Object.fromEntries(Object.entries(domains).map(([k, v]) => [
      k, { ...v, pct: v.total > 0 ? Math.round((v.correct / v.total) * 100) : 0 }
    ]))
  };
}

function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${String(sec).padStart(2, "0")}`;
}

const INIT = {
  screen: "levelSelect",
  level: null,
  levelConfig: null,
  practiceQs: [], practiceIdx: 0, practiceAnswers: {}, practiceRevealed: {},
  mockQs: [], mockIdx: 0, mockAnswers: {}, mockSection: 1,
  mockTimeLeft: 0, mockPaused: false, mockShowBreak: false, mockShowIntro: false,
  results: null, showReview: false,
};

function reducer(state, action) {
  switch (action.type) {
    case "GO_HOME":
      return { ...INIT };
    case "SELECT_LEVEL": {
      const cfg = action.level === "acc" ? ACC_CONFIG : PCC_CONFIG;
      return { ...INIT, screen: "landing", level: action.level, levelConfig: cfg };
    }
    case "START_PRACTICE": {
      const cfg = state.levelConfig;
      return {
        ...state, screen: "practice",
        practiceQs: pickQuestions(cfg.questions, cfg.practiceCount, cfg.domainWeights),
        practiceIdx: 0, practiceAnswers: {}, practiceRevealed: {},
      };
    }
    case "ANSWER_PRACTICE": {
      const q = state.practiceQs[state.practiceIdx];
      return {
        ...state,
        practiceAnswers: { ...state.practiceAnswers, [q.id]: action.idx },
        practiceRevealed: { ...state.practiceRevealed, [q.id]: true },
      };
    }
    case "NEXT_PRACTICE": {
      const next = state.practiceIdx + 1;
      if (next >= state.practiceQs.length)
        return { ...state, screen: "results", results: calcResults(state.practiceQs, state.practiceAnswers, state.levelConfig.domainMeta) };
      return { ...state, practiceIdx: next };
    }
    case "START_MOCK": {
      const cfg = state.levelConfig;
      return {
        ...state, screen: "mock",
        mockQs: pickQuestions(cfg.questions, cfg.mockCount, cfg.domainWeights),
        mockTimeLeft: cfg.mockSecs,
        mockIdx: 0, mockAnswers: {}, mockSection: 1,
        mockShowIntro: true, mockPaused: true, mockShowBreak: false,
      };
    }
    case "BEGIN_MOCK":
      return { ...state, mockShowIntro: false, mockPaused: false };
    case "ANSWER_MOCK": {
      const q = state.mockQs[state.mockIdx];
      return { ...state, mockAnswers: { ...state.mockAnswers, [q.id]: action.idx } };
    }
    case "NEXT_MOCK": {
      const next = state.mockIdx + 1;
      const half = Math.floor(state.mockQs.length / 2);
      if (next === half && state.mockSection === 1)
        return { ...state, mockShowBreak: true, mockPaused: true };
      if (next >= state.mockQs.length)
        return { ...state, screen: "results", results: calcResults(state.mockQs, state.mockAnswers, state.levelConfig.domainMeta) };
      return { ...state, mockIdx: next };
    }
    case "CONTINUE_MOCK":
      return { ...state, mockSection: 2, mockPaused: false, mockShowBreak: false, mockIdx: state.mockIdx + 1 };
    case "FINISH_MOCK":
      return { ...state, screen: "results", results: calcResults(state.mockQs, state.mockAnswers, state.levelConfig.domainMeta) };
    case "TICK":
      if (state.mockPaused) return state;
      if (state.mockTimeLeft <= 1)
        return { ...state, screen: "results", results: calcResults(state.mockQs, state.mockAnswers, state.levelConfig.domainMeta) };
      return { ...state, mockTimeLeft: state.mockTimeLeft - 1 };
    case "TOGGLE_REVIEW":
      return { ...state, showReview: !state.showReview };
    default: return state;
  }
}

  const base = {
    display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 8,
    padding: "12px 24px", borderRadius: 10, fontSize: 15, fontWeight: 600,

    transition: "all .18s ease", width: full ? "100%" : undefined,
  };
  const variants = {
    primary: {
      background: hover ? C.accentDark : C.accent,
      color: C.accentText,
      boxShadow: hover ? `0 4px 24px ${C.accentGlow}` : "none",
      fontWeight: 700,
    },
    ghost: {
      background: "transparent", color: C.accent,
      border: `1.5px solid ${hover ? C.accent : C.accentBorder}`,
    },
    subtle: {
      background: hover ? C.surfaceHover : C.surface,
      color: C.textSub, border: `1px solid ${C.border}`,
    },
    danger: {
      background: hover ? "#dc2626" : "#ef4444", color: "#fff",

  };
  return (
    <button
      onClick={onClick}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{ ...base, ...variants[variant], ...style }}
    >
      {children}
    </button>
  );
}

//  KÉRDÉS KÁRTYA
// ═══════════════════════════════════════════════════════════════
function QuestionCard({ q, selectedIdx, onSelect, revealed, isMock, domainMeta }) {
  const isCorrect = selectedIdx === q.correctIndex;

  return (
    <div className="fade">
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 20 }}>
        <Badge domain={q.domain} meta={domainMeta} />
        <span style={{ fontSize: 12, color: C.textDim }}>
          {"●".repeat(q.difficulty) + "○".repeat(3 - q.difficulty)}
        </span>
      </div>

      <p style={{ fontSize: 18, lineHeight: 1.65, color: C.text, fontWeight: 500, marginBottom: 28 }}>
        {q.question}
      </p>

      <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 24 }}>
        {q.options.map((opt, i) => {
          let bg = C.surface, border = C.border, color = C.textSub;

          if (revealed || isMock) {
            if (i === selectedIdx && !revealed) { bg = C.surfaceHover; border = C.borderLight; color = C.text; }
          }

          if (revealed) {
            if (i === q.correctIndex) { bg = C.correctBg; border = C.correctBorder; color = C.correct; }
            else if (i === selectedIdx && !isCorrect) { bg = C.wrongBg; border = C.wrongBorder; color = C.wrong; }
          }

          if (!revealed && i === selectedIdx) { bg = C.surfaceHover; border = C.borderLight; color = C.text; }

          return (
            <button
              key={i}
              disabled={revealed && !isMock}
              onClick={() => onSelect(i)}
              style={{
                background: bg, border: `1.5px solid ${border}`, borderRadius: 10,
                padding: "14px 18px", textAlign: "left", cursor: revealed && !isMock ? "default" : "pointer",
                color, fontSize: 15, lineHeight: 1.55, fontFamily: "Inter, sans-serif",
                fontWeight: i === selectedIdx ? 500 : 400,
                transition: "all .15s ease",
                display: "flex", alignItems: "flex-start", gap: 12,
              }}
            >
              <span style={{
                minWidth: 24, height: 24, borderRadius: "50%",
                border: `1.5px solid ${border}`, display: "flex", alignItems: "center",
                justifyContent: "center", fontSize: 12, fontWeight: 700, flexShrink: 0, marginTop: 1,
                background: i === selectedIdx ? (revealed ? (i === q.correctIndex ? C.correct : C.wrong) : C.borderLight) : "transparent",
                color: i === selectedIdx ? "#fff" : color,
              }}>
                {String.fromCharCode(65 + i)}
              </span>
              {opt}
            </button>
          );
        })}
      </div>

      {revealed && (
        <div className="fade" style={{
          background: isCorrect ? C.correctBg : C.wrongBg,
          border: `1px solid ${isCorrect ? C.correctBorder : C.wrongBorder}`,
          borderRadius: 12, padding: "18px 20px",
        }}>
          <p style={{ fontWeight: 700, color: isCorrect ? C.correct : C.wrong, marginBottom: 10, fontSize: 15 }}>
            {isCorrect ? "✓ Helyes!" : `✗ Helytelen — A helyes válasz: ${String.fromCharCode(65 + q.correctIndex)}`}
          </p>
          <p style={{ color: C.textSub, fontSize: 14, lineHeight: 1.7, marginBottom: 10 }}>{q.explanation}</p>
          <p style={{ color: C.textDim, fontSize: 12 }}>📚 {q.reference}</p>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  GYAKORLÓ MÓD
// ═══════════════════════════════════════════════════════════════
function PracticeScreen({ state, dispatch }) {
  const q = state.practiceQs[state.practiceIdx];
  const selected = state.practiceAnswers[q.id];
  const revealed = state.practiceRevealed[q.id];
  const total = state.practiceQs.length;
  const current = state.practiceIdx + 1;
  const pct = Math.round((current - 1) / total * 100);

  return (
    <div style={{ maxWidth: 720, margin: "0 auto", padding: "32px 24px 80px" }}>
      {/* Progress */}
      <div style={{ marginBottom: 32 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <span style={{ fontSize: 13, color: C.textSub, fontWeight: 500 }}>Gyakorló mód</span>
          <span style={{ fontSize: 13, color: C.textSub }}>{current} / {total}</span>
        </div>
        <div style={{ height: 4, background: C.surface, borderRadius: 2, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${pct}%`, background: C.accent, borderRadius: 2, transition: "width .3s ease" }} />
        </div>
      </div>

      <QuestionCard
        q={q}
        selectedIdx={selected}
        onSelect={idx => !revealed && dispatch({ type: "ANSWER_PRACTICE", idx })}
        revealed={!!revealed}
        isMock={false}
        domainMeta={state.levelConfig?.domainMeta}
      />

      {revealed && (
        <div style={{ marginTop: 24, display: "flex", justifyContent: "flex-end" }}>
          <Btn onClick={() => dispatch({ type: "NEXT_PRACTICE" })}>
            {state.practiceIdx + 1 < total ? "Következő kérdés →" : "Eredmények megtekintése →"}
          </Btn>
        </div>
      )}

      {!revealed && selected === undefined && (
        <p style={{ textAlign: "center", color: C.textDim, fontSize: 13, marginTop: 24 }}>
          Válassz egy választ a folytatáshoz
        </p>
      )}
    </div>
  );
}

function MockScreen({ state, dispatch }) {
  useEffect(() => {
    if (state.mockPaused || state.screen !== "mock") return;
    const id = setInterval(() => dispatch({ type: "TICK" }), 1000);
    return () => clearInterval(id);
  }, [state.mockPaused, state.screen]);

  const q = state.mockQs[state.mockIdx];
  const selected = state.mockAnswers[q.id];
  const total = state.mockQs.length;
  const current = state.mockIdx + 1;
  const pct = Math.round((current - 1) / total * 100);
  const timeWarning = state.mockTimeLeft < 300;

  if (state.mockShowIntro) {
    return (
      <div style={{ maxWidth: 540, margin: "80px auto", padding: "0 24px" }}>
        <div className="fade" style={{
          background: C.surface, border: `1px solid ${C.border}`,
          borderRadius: 16, padding: "48px 40px", textAlign: "center",
        }}>
          <div style={{
            display: "inline-block", background: C.accentGlow, border: `1px solid ${C.accentBorder}`,

          </p>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 32 }}>
            {[
              { icon: "📋", label: `${state.levelConfig?.mockCount || 60} kérdés`, sub: `2 szekció (${Math.floor((state.levelConfig?.mockCount || 60) / 2)}+${Math.ceil((state.levelConfig?.mockCount || 60) / 2)})` },

                <div style={{ fontSize: 12, color: C.textSub, marginTop: 2 }}>{item.sub}</div>
              </div>
            ))}
          </div>
          <p style={{ fontSize: 13, color: C.textDim, marginBottom: 28, lineHeight: 1.6 }}>
            Szabály: minden kérdésre válaszolj, nem jár büntetőpont a hibás válaszért. A vizsga az idő lejártakor automatikusan véget ér.
          </p>
          <Btn full onClick={() => dispatch({ type: "BEGIN_MOCK" })} style={{ fontSize: 17, padding: "16px 32px" }}>
            Vizsga indítása →

          <button onClick={() => dispatch({ type: "GO_HOME" })} style={{

          }}>← Vissza a főoldalra</button>
        </div>
      </div>
    );

  if (state.mockShowBreak) {
    return (
      <div style={{ maxWidth: 500, margin: "80px auto", padding: "0 24px", textAlign: "center" }}>

          background: C.surface, border: `1px solid ${C.border}`, borderRadius: 20, padding: "48px 40px",

          <div style={{ fontSize: 48, marginBottom: 20 }}>☕</div>
          <h2 style={{ fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 28, color: C.text, marginBottom: 12 }}>

          <p style={{ color: C.textSub, fontSize: 15, lineHeight: 1.7, marginBottom: 32 }}>

  }

  return (
    <div style={{ maxWidth: 720, margin: "0 auto", padding: "32px 24px 80px" }}>
      {/* Header sor */}
      <div style={{ marginBottom: 32 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
            <span style={{ fontSize: 13, color: C.textSub, fontWeight: 500 }}>
              {state.mockSection}. szekció · {current} / {total}
            </span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <span style={{
              fontSize: 14, fontWeight: 700, fontVariantNumeric: "tabular-nums",
              color: timeWarning ? C.wrong : C.textSub,
              background: timeWarning ? C.wrongBg : C.surface,
              border: `1px solid ${timeWarning ? C.wrongBorder : C.border}`,
              padding: "4px 12px", borderRadius: 8,
            }}>
              ⏱ {fmtTime(state.mockTimeLeft)}
            </span>
            <Btn variant="subtle" style={{ padding: "6px 14px", fontSize: 12 }}
              onClick={() => dispatch({ type: "FINISH_MOCK" })}>
              Befejezés
            </Btn>
          </div>
        </div>
        <div style={{ height: 4, background: C.surface, borderRadius: 2, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${pct}%`, background: C.accent, borderRadius: 2, transition: "width .3s ease" }} />
        </div>
      </div>

      <QuestionCard
        q={q}
        selectedIdx={selected}
        onSelect={idx => dispatch({ type: "ANSWER_MOCK", idx })}
        revealed={false}
        isMock={true}
        domainMeta={state.levelConfig?.domainMeta}
      />

      <div style={{ marginTop: 28, display: "flex", justifyContent: "flex-end" }}>
        <Btn
          onClick={() => dispatch({ type: "NEXT_MOCK" })}
          style={{ opacity: selected === undefined ? 0.4 : 1 }}
        >
          {current < total ? "Következő →" : "Eredmények →"}
        </Btn>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  EREDMÉNYEK
// ═══════════════════════════════════════════════════════════════
function ResultsScreen({ state, dispatch }) {
  const r = state.results;
  const questions = state.screen === "results"
    ? (state.practiceQs.length > 0 ? state.practiceQs : state.mockQs)
    : [];
  const qs = state.mockAnswers && Object.keys(state.mockAnswers).length > 0 ? state.mockQs : state.practiceQs;
  const answers = state.mockAnswers && Object.keys(state.mockAnswers).length > 0 ? state.mockAnswers : state.practiceAnswers;

  const cardStyle = {
    background: C.surface, border: `1px solid ${C.border}`,
    borderRadius: 16, padding: "24px",
  };

  return (
    <div style={{ maxWidth: 720, margin: "0 auto", padding: "40px 24px 80px" }}>
      <div className="fade">
        {/* Főeredmény */}
        <div style={{
          textAlign: "center",
          background: r.passed ? C.correctBg : C.wrongBg,
          border: `1px solid ${r.passed ? C.correctBorder : C.wrongBorder}`,
          borderRadius: 20, padding: "40px 32px", marginBottom: 28,
        }}>
          <div style={{ fontSize: 52, marginBottom: 12 }}>{r.passed ? "🎉" : "💪"}</div>
          <h2 style={{
            fontFamily: "'Syne', sans-serif", fontWeight: 800,
            fontSize: "clamp(28px, 5vw, 40px)",
            color: r.passed ? C.correct : C.wrong,
            marginBottom: 10,
          }}>
            {r.passed ? "ÁTMENT ✓" : "MÉG NEM"}
          </h2>
          <p style={{ fontSize: 28, fontWeight: 800, color: C.text, marginBottom: 6 }}>
            {r.correct} / {r.total}
          </p>
          <p style={{ fontSize: 18, color: r.passed ? C.correct : C.wrong, fontWeight: 600, marginBottom: 12 }}>
            {r.percentage}%
          </p>
          <p style={{ fontSize: 14, color: C.textSub }}>
            Átmenő pontszám: 460/600 · {r.passed ? "Gratulálunk!" : "Gyakorolj még és próbáld újra!"}
          </p>
        </div>

        {/* Domain bontás */}
        <div style={{ ...cardStyle, marginBottom: 20 }}>
          <h3 style={{ fontSize: 15, fontWeight: 700, color: C.text, marginBottom: 18 }}>Területenkénti bontás</h3>
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            {Object.entries(r.domains).map(([key, d]) => (
              <div key={key}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                  <span style={{ fontSize: 14, color: C.textSub, fontWeight: 500 }}>{d.label}</span>
                  <span style={{ fontSize: 14, fontWeight: 700, color: d.color }}>
                    {d.correct}/{d.total} · {d.pct}%
                  </span>
                </div>
                <div style={{ height: 6, background: C.bg, borderRadius: 3, overflow: "hidden" }}>
                  <div style={{
                    height: "100%", width: `${d.pct}%`, background: d.color,
                    borderRadius: 3, transition: "width .6s ease",
                  }} />
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Gombok */}
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 32 }}>
          <Btn onClick={() => dispatch({ type: "GO_HOME" })}>← Főoldal</Btn>
          <Btn variant="ghost" onClick={() => dispatch({ type: qs === state.practiceQs ? "START_PRACTICE" : "START_MOCK" })}>
            Újrapróbálom
          </Btn>
          <Btn variant="subtle" onClick={() => dispatch({ type: "TOGGLE_REVIEW" })}>
            {state.showReview ? "Elrejt" : "Összes válasz áttekintése"}
          </Btn>
        </div>

        {/* Review */}
        {state.showReview && (
          <div className="fade">
            <h3 style={{ fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 22, color: C.text, marginBottom: 24 }}>
              Válaszok áttekintése
            </h3>
            <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
              {qs.map((q, i) => {
                const ans = answers[q.id];
                const correct = ans === q.correctIndex;
                return (
                  <div key={q.id} style={{
                    ...cardStyle,
                    borderLeft: `3px solid ${correct ? C.correct : C.wrong}`,
                  }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                        <span style={{ fontSize: 12, color: C.textDim, fontWeight: 600 }}>{i + 1}.</span>
                        <Badge domain={q.domain} meta={state.levelConfig?.domainMeta} />
                      </div>
                      <span style={{ fontSize: 13, fontWeight: 700, color: correct ? C.correct : C.wrong }}>
                        {correct ? "✓" : "✗"}
                      </span>
                    </div>
                    <p style={{ fontSize: 14, color: C.text, marginBottom: 12, lineHeight: 1.6 }}>{q.question}</p>
                    {ans !== undefined && ans !== q.correctIndex && (
                      <p style={{ fontSize: 13, color: C.wrong, marginBottom: 6 }}>
                        Válaszod: {q.options[ans]}
                      </p>
                    )}
                    <p style={{ fontSize: 13, color: C.correct, marginBottom: 12 }}>
                      Helyes: {q.options[q.correctIndex]}
                    </p>
                    <p style={{ fontSize: 13, color: C.textSub, lineHeight: 1.65 }}>{q.explanation}</p>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  APP
// ═══════════════════════════════════════════════════════════════
function App() {
  const [state, dispatch] = useReducer(reducer, INIT);

  return (
    <div style={{ minHeight: "100vh", background: C.bg, fontFamily: "Inter, sans-serif", color: C.text }}>
      <style>{`
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .fade { animation: fadeIn .25s ease; }
        * { box-sizing: border-box; }
        button:focus { outline: none; }
        body { font-family: Inter, sans-serif; }
      `}</style>

      <Header onHome={() => dispatch({ type: "GO_HOME" })} />

      {state.screen === "levelSelect" && <LevelSelect dispatch={dispatch} />}
      {state.screen === "landing"     && <Landing      state={state} dispatch={dispatch} />}
      {state.screen === "practice"    && <PracticeScreen state={state} dispatch={dispatch} />}
      {state.screen === "mock"        && <MockScreen     state={state} dispatch={dispatch} />}
      {state.screen === "results"     && <ResultsScreen  state={state} dispatch={dispatch} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
